<body class="bg-ink-50 text-ink-900 font-body-md text-body-md min-h-screen flex flex-col items-center pt-12 pb-24 px-4 sm:px-6">
<!-- Focused Canvas Content -->
<main class="w-full max-w-[560px] bg-surface-bright border-[1px] border-ink-100 p-8 sm:p-10 shadow-sm relative">
<!-- Back Link -->
<a class="inline-flex items-center gap-2 text-ink-400 hover:text-primary transition-colors mb-8 group" href="#">
<span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
<span class="font-label-mono text-label-mono uppercase tracking-wider">Back to forum</span>
</a>
<!-- Header -->
<div class="mb-10">
<div class="flex items-center gap-4 mb-4">
<img alt="User avatar" class="w-12 h-12 rounded-full border border-ink-200" data-alt="A small circular avatar placeholder image showing a generic user profile picture in a professional setting. The image should fit within a minimal corporate modern design system. The lighting is soft and neutral, conveying approachability and authority. The overall tone is clean and functional, suitable for a technical administration dashboard context." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8JHwmuERABdnpTzJ38_3mCnL95i9iEXGcehqDcUN4aADxaFniqhA9eHsnGzNVHuBoKjOmtXhk_VczJRdJr7BqMHBKlFRif6mm8gtT42c7C1-QlA1bKeCkYrnl4Ur-q-QkpPZSEdgi0y-K9P1ffct9x4R9SNdCE-QcgwbKsImdYtQ2RHQoQGYAUIYWwpu4HkkpNDTovf2BiNmDGG_045KC6v6Oto_fnk0UNRLmkp6Z3r6lYs6tAFvDOZ8apI72rmr7Bh1w85IrKfM2"/>
<div>
<h1 class="font-headline-md text-headline-md text-ink-900 mb-1">Submit to Admin</h1>
<p class="font-body-sm text-body-sm text-ink-400">Escalate an unresolved issue to the technical support team.</p>
</div>
</div>
<!-- Thread Reference -->
<div class="flex items-start gap-3 p-4 bg-ink-50 border border-ink-100 rounded-DEFAULT">
<div class="mt-0.5 flex-shrink-0">
<span class="inline-flex items-center gap-1.5 px-2 py-1 bg-status-escalated/10 text-status-escalated border border-status-escalated/20 rounded-DEFAULT font-label-mono text-label-mono uppercase">
<span class="w-1.5 h-1.5 rounded-full bg-status-escalated"></span>
                        Escalating
                    </span>
</div>
<div>
<h3 class="font-body-md text-body-md font-semibold text-ink-700">Database connection timeout during peak load</h3>
<p class="font-body-sm text-body-sm text-ink-400 mt-1">Thread #4928 • Unresolved by community</p>
</div>
</div>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Original Question (Read Only) -->
<div>
<label class="block font-label-mono text-label-mono text-ink-700 uppercase mb-2" for="original-question">Original Context</label>
<div class="relative">
<textarea class="block w-full bg-ink-50 border-ink-200 text-ink-400 font-body-sm text-body-sm focus:ring-0 focus:border-ink-200 resize-none cursor-not-allowed" id="original-question" name="original-question" readonly="" rows="3">We're seeing intermittent 504 Gateway Timeout errors when connecting to the primary database cluster during our daily 9 AM traffic spike. The connection pool seems to be exhausted despite recent scaling.</textarea>
<span class="material-symbols-outlined absolute top-3 right-3 text-ink-400" data-icon="lock">lock</span>
</div>
</div>
<!-- Rephrase for Admin -->
<div>
<div class="flex justify-between items-end mb-2">
<label class="block font-label-mono text-label-mono text-ink-900 uppercase" for="admin-details">Additional Context for Admin <span class="text-error">*</span></label>
<span class="font-label-mono text-label-mono text-ink-400" id="char-count">0/500</span>
</div>
<textarea class="block w-full bg-surface-bright border-ink-200 text-ink-900 font-body-sm text-body-sm focus:ring-primary focus:border-primary placeholder:text-ink-200 transition-colors resize-y" id="admin-details" name="admin-details" oninput="document.getElementById('char-count').innerText = this.value.length + '/500'" placeholder="Provide any additional logs, specific timestamps, or steps taken since posting the original question..." required="" rows="5"></textarea>
</div>
<!-- Action Area -->
<div class="pt-6 border-t border-ink-100">
<button class="w-full bg-primary hover:bg-blue-600 text-white font-body-md text-body-md py-4 px-6 font-semibold transition-colors flex justify-center items-center gap-2 group focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="submit">
<span>Submit Escalation</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="send">send</span>
</button>
<p class="text-center font-body-sm text-body-sm text-ink-400 mt-4">
                    Admin response time is typically within 4-6 hours for escalated technical inquiries.
                </p>
</div>
</form>
